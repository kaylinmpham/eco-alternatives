<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <span id="brand-name">Mint</span>
        <button
          id="settings-toggle"
          aria-label="Size preferences"
          title="Size preferences"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"
            />
          </svg>
        </button>
      </header>

      <div id="settings-section" hidden>
        <p class="settings-label">
          My sizes <span class="settings-hint">— filters eBay results</span>
        </p>
        <div id="size-chips"></div>
        <p class="settings-footer">Select none to show all sizes.</p>
      </div>

      <div id="waiting-state">
        <svg
          class="waiting-leaf"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="52"
          height="52"
        >
          <path
            d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"
          />
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" />
        </svg>
        <p>Browse a product page and we'll find it secondhand for you.</p>
        <span class="waiting-hint">eBay listings, filtered to your size.</span>
      </div>

      <div id="product-state" hidden>
        <div id="score-section">
          <div id="product-brand"></div>
          <div id="tier-ladder">
            <span class="tier-rung" data-pos="1">We Avoid</span>
            <span class="tier-rung" data-pos="2">Poor</span>
            <span class="tier-rung" data-pos="3">Fair</span>
            <span class="tier-rung" data-pos="4">Good</span>
            <span class="tier-rung" data-pos="5">Great</span>
          </div>
          <div id="score-sublabel"></div>
          <div id="retailer-note" hidden></div>
        </div>

        <div id="alternatives-section">
          <h3>
            Find it in <em><strong>mint condition.</strong></em>
          </h3>
          <div id="alternatives-grid"></div>
        </div>
        <button id="load-more" hidden>Load more</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
