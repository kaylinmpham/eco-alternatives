name = "eco-alternatives-score"
main = "worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "SCORES_KV", id = "c8c281b2f5364fc9a6571ca292de5f6a" }
]

# Hourly cron: proactively refreshes the eBay OAuth token before it expires (2h TTL).
[triggers]
crons = ["0 * * * *"]

# Secrets (set via wrangler CLI, never committed to source):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put EBAY_CLIENT_ID
#   wrangler secret put EBAY_CLIENT_SECRET
